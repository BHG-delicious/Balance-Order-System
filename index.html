<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WR2JVSZ5"

  <!-- 修正點 1：替 iframe 加上 id="gasFrame"，否則下方的 postMessage 會找不到目標而報錯 -->
  <iframe id="gasFrame" src="https://script.google.com/macros/s/AKfycby8avMBWXM4N6XRRFcj2cgWffaRv7ReCc_4IrjrrQ1_OqjEMHxPYqpfrB_asWGKnUFCOg/exec"></iframe>

  <script>
    // 註冊 Service Worker 啟用 PWA 功能
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('PWA Service Worker 註冊成功'))
        .catch((err) => console.log('註冊失敗:', err));
    }

    // 修正點 2：全面改用官方 v16 推薦的 OneSignalDeferred 語法，與 head 衝突代碼合併
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.init({
          appId: "e6add4c0-fd20-4fe3-8b61-a63e88c090d0",
          notifyButton: { enable: true },
          
          // 【終極修正】硬性指定加上您的 GitHub 儲存庫子路徑
          serviceWorkerPath: "Balance-Order-System/OneSignalSDKWorker.js", 
          serviceWorkerParam: { scope: "/Balance-Order-System/" } 
        });
        console.log("OneSignal 初始化成功！");

        // 監聽訂閱狀態改變
        OneSignal.User.PushSubscription.addEventListener("change", function(event) {
          if (event.current && event.current.id) {
            const userId = event.current.id;
            console.log("取得用戶推播ID:", userId);
            
            const gasFrame = document.getElementById("gasFrame");
            if (gasFrame && gasFrame.contentWindow) {
              gasFrame.contentWindow.postMessage({ type: "PUSH_ID", id: userId }, "*");
            }
          }
        });

      } catch (error) {
        console.error("OneSignal 初始化發生錯誤:", error);
      }
    });

  </script>
</body>
