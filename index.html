  <script>
    // 監聽來自內嵌 iframe (GAS) 的訊息
    window.addEventListener('message', function(event) {
      // 安全檢查：確保訊息是來自 Google Script 網域
      if (!event.origin.includes('google.com') && !event.origin.includes('googleusercontent.com')) {
        console.log('訊息不是來自 Google Script 網域');
        return; 
      }
      
      // 如果確認是我們自己發出的 GAS 事件
      if (event.data && event.data.type === 'GAS_EVENT') {
        console.log('收到來自 GAS 的事件:', event.data);

        switch (event.data.cmd) {
          case 'event':
            if (event.data.eventName !== 'page_view') {
              gtag('event', event.data.eventName, event.data.detail);
            }
            break;
          case 'set':
            gtag('set', event.data.detail);
            break;
        }
      } else if (event.data && event.data.type === 'GAS_URL') {
        console.log('收到來自 GAS 的參數:', event.data);
        const currentUrl = new URL(window.location.href);
        if (event.data.parName === 'hash') {
          currentUrl.hash = event.data.parCont;
          window.history.pushState({}, document.title, currentUrl);
        } else {
          currentUrl.searchParams.set(event.data.parName, event.data.parCont);
          window.history.pushState({}, document.title, currentUrl);
          gtag('event', 'page_view', {
            page_title: event.data.parCont,
            page_location: window.location.href,
            user_agent: navigator.userAgent
          });
          gtag('set',{'Page Title': event.data.parCont});
        }
      } else {
        console.log('收到非來自 GAS 的事件', event.data || 'none');
      }
    });
