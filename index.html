  <!-- 嵌入你的 GAS 網頁 -->

  <script>
    // 註冊 Service Worker 啟用 PWA 功能
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('PWA Service Worker 註冊成功'))
        .catch((err) => console.log('註冊失敗:', err));
    }

    window.OneSignal = window.OneSignal || [];
    OneSignal.push(function() {
      OneSignal.init({
        appId: "e6add4c0-fd20-4fe3-8b61-a63e88c090d0", // 替換成你的 OneSignal App ID
        /*safari_web_id: "如果你有申請Safari專用ID可填",*/
        notifyButton: { enable: true } // 右下角會出現一個鈴鐺小圖示供訂閱
      });
      
      // 當使用者成功訂閱推播時，取得他的 OneSignal Subscription ID
      OneSignal.User.PushSubscription.addEventListener("change", function(event) {
        if (event.current.id) {
          const userId = event.current.id;
          console.log("取得用戶推播ID:", userId);
          
          // 【關鍵】將這個用戶 ID 傳送給 iframe 內部的 GAS 後端儲存
          const gasFrame = document.getElementById("gasFrame").contentWindow;
          gasFrame.postMessage({ type: "PUSH_ID", id: userId }, "*");
        }
      });
    });
  </script>
