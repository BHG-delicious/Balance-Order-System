  <script>
    const gasFrame = document.getElementById("gasFrame");
    gasFrame.src = targetUrl.toString();
    
    const keysToClearFromUrl = ['password', 'utm_source', 'utm_medium', 'utm_campaign', 'fbclid'];

    (function() {
      const currentUrl = new URL(window.location.href);
      const originalUrl = new URL(window.location.href);
      let needToCleanUrl = false;
  
      // 檢查並移除特定參數
      keysToClearFromUrl.forEach(key => {
        if (currentUrl.searchParams.has(key)) {
          currentUrl.searchParams.delete(key);
          needToCleanUrl = true; // 標記需要更新網址列
        }
      });
  
      // 如果有匹配到需要移除的參數，在不刷新頁面的情況下，瞬間變更瀏覽器自身網址
      if (needToCleanUrl) {
        const oldUrlString = originalUrl.pathname + originalUrl.search + originalUrl.hash
        const newUrlString = currentUrl.pathname + currentUrl.search + currentUrl.hash;
        window.history.replaceState({}, document.title, newUrlString);
        console.log('【網址淨化】: \n', oldUrlString, '\nto\n', newUrlString);
      }
    })();
    
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.init({
          appId: "e6add4c0-fd20-4fe3-8b61-a63e88c090d0",
          notifyButton: { enable: true },
          serviceWorkerPath: "Balance-Order-System/OneSignalSDKWorker.js", 
          serviceWorkerParam: { scope: "/Balance-Order-System/" } 
        });
        console.log("OneSignal 初始化成功！");

        // 1. 初始化時檢查是否已有訂閱 ID
        setTimeout(async () => {
          const pushId = OneSignal.User.PushSubscription.id;
          if (pushId) {
            handleGasUrlUpdate(pushId);
          }
        }, 1500);

        // 2. 監聽後續訂閱狀態改變
        OneSignal.User.PushSubscription.addEventListener("change", function(event) {
          if (event.current && event.current.id) {
            handleGasUrlUpdate(event.current.id);
          }
        });

      } catch (error) {
        console.error("OneSignal 初始化發生錯誤:", error);
      }
    });

    // 【關鍵機制】檢查當前 iframe 網址，若沒有帶有該用戶的推播 ID，就將其更新
    function handleGasUrlUpdate(userId) {
      console.log("當前用戶推播ID:", userId);
      const gasFrame = document.getElementById("gasFrameNone");
      if (!gasFrame) return;

      // 如果 iframe 當前的網址還沒有這個參數，就幫它轉跳導向（首次訂閱或新用戶時會觸發一次）
      gasFrame.src = baseGasUrl + "?pushId=" + userId;
      
    }
  </script>
