  <!-- 修正點 1：替 iframe 加上 id="gasFrame"，否則下方的 postMessage 會找不到目標而報錯 -->
  <iframe id="gasFrame" src="https://script.google.com/macros/s/AKfycby8avMBWXM4N6XRRFcj2cgWffaRv7ReCc_4IrjrrQ1_OqjEMHxPYqpfrB_asWGKnUFCOg/exec"></iframe>

  <script>
    const baseGasUrl = "https://script.google.com/macros/s/AKfycby8avMBWXM4N6XRRFcj2cgWffaRv7ReCc_4IrjrrQ1_OqjEMHxPYqpfrB_asWGKnUFCOg/exec";
    const gasFrame = document.getElementById('gasFrame');
    
    // 儲存 GAS 的實際 origin（用於後續驗證）
    let gasOrigin = '';

    // --- 1. 核心功能：解析 URL 並發送參數給 GAS iframe ---
    function sendUrlParamsToGas() {
      if (!gasFrame || !gasFrame.contentWindow) {
        console.warn("⚠️ iframe 尚未載入，稍後重試...");
        return;
      }

      // 解析外層瀏覽器的 URL
      const urlParams = new URLSearchParams(window.location.search);
      const page = urlParams.get('page');
      const password = urlParams.get('password');
      const pushId = urlParams.get('pushId');

      const message = {
        type: 'URL_PARAMS',
        data: { page, password, pushId }
      };

      console.log('📤 [外層] 發送參數給 GAS:', message);
      // 關鍵：使用 '*' 作為 targetOrigin，允許跨域發送
      gasFrame.contentWindow.postMessage(message, '*');
    }

    // --- 2. 監聽來自 GAS 的導航請求，更新外層 URL ---
    window.addEventListener('message', (event) => {
      // 記錄 GAS 的 origin（第一次收到訊息時）
      if (!gasOrigin && event.origin.includes('script.googleusercontent.com')) {
        gasOrigin = event.origin;
        console.log('✅ [外層] 記錄 GAS origin:', gasOrigin);
      }

      // 可以放寬驗證，或信任所有來自 GAS 的訊息
      // 由於無法預測 GAS 的確切 origin，建議先信任所有來源
      
      if (event.data && event.data.type === 'UPDATE_URL') {
        const newPage = event.data.page;
        if (newPage) {
          const newUrl = new URL(window.location.href);
          newUrl.searchParams.set('page', newPage);
          window.history.pushState({}, '', newUrl);
          console.log(`🔄 [外層] URL 已更新為: ${newUrl}`);
        }
      }
    });

    // --- 3. 監聽瀏覽器的前進/後退按鈕 (popstate) ---
    window.addEventListener('popstate', () => {
      console.log('🔙 [外層] 偵測到瀏覽器導航，重新發送參數');
      sendUrlParamsToGas();
    });

    // --- 4. 等待 iframe 載入完成後發送初次參數 ---
    if (gasFrame) {
      gasFrame.addEventListener('load', () => {
        console.log('✅ [外層] iframe 載入完成，發送初始參數');
        // 延遲一點確保 GAS 端的 listener 已就緒
        setTimeout(() => {
          sendUrlParamsToGas();
        }, 500);
      });
    } else {
      console.error('❌ 找不到 iframe 元素');
    }

    // --- 5. 原有的 OneSignal 初始化邏輯 (保持不變) ---
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.init({
          appId: "e6add4c0-fd20-4fe3-8b61-a63e88c090d0",
          notifyButton: { enable: true },
          serviceWorkerPath: "Balance-Order-System/OneSignalSDKWorker.js",
          serviceWorkerParam: { scope: "/Balance-Order-System/" }
        });
        console.log("OneSignal 初始化成功！");

        setTimeout(async () => {
          const pushId = OneSignal.User.PushSubscription.id;
          if (pushId) {
            // 將 pushId 透過 message 傳給 GAS，這部分可整合到 sendUrlParamsToGas 一併處理
            if (gasFrame && gasFrame.contentWindow) {
              gasFrame.contentWindow.postMessage({ type: 'PUSH_ID', id: pushId }, '*');
            }
          }
        }, 1500);

        OneSignal.User.PushSubscription.addEventListener("change", function(event) {
          if (event.current && event.current.id) {
            if (gasFrame && gasFrame.contentWindow) {
              gasFrame.contentWindow.postMessage({ type: 'PUSH_ID', id: event.current.id }, '*');
            }
          }
        });

      } catch (error) {
        console.error("OneSignal 初始化發生錯誤:", error);
      }
    });
  </script>
